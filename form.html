<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>RSVP</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page">
  <h1>You're Invited</h1>

  <div class="canvas-wrap">
    <svg id="drawing-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
    <button type="button" class="clear-btn" id="clear-btn">Clear</button>
  </div>

  <form name="rsvp" method="POST" action="/thanks.html" data-netlify="true" netlify-honeypot="bot-field" id="rsvp-form">
    <input type="hidden" name="form-name" value="rsvp">
    <input type="hidden" name="drawing" id="drawing">

    <p class="hp-field" aria-hidden="true">
      <label>Don't fill this out: <input name="bot-field" tabindex="-1" autocomplete="off"></label>
    </p>

    <input class="field" type="text" name="name" placeholder="Name" required>
    <input class="field" type="email" name="email" placeholder="Email" required>
    <textarea class="field" name="note" rows="2" placeholder="Note (optional)"></textarea>

    <button class="submit-btn" type="submit">RSVP</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
